<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Neon Pro 🎲</title>
    <style>
        /* FUNDO DE ESTRELAS DINÂMICO */
        body { 
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            text-align: center; margin: 0; padding: 20px; padding-bottom: 120px;
            overflow-x: hidden;
        }

        h1 { 
            color: #00e5ff; text-transform: uppercase; letter-spacing: 4px; 
            margin-bottom: 40px; text-shadow: 0 0 20px #00e5ff;
            font-size: 2rem;
        }
        
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 10px; max-width: 1100px; margin: 0 auto; }
        
        /* CARDS COM EFEITO DE GLOW */
        .card { 
            background: rgba(17, 17, 17, 0.8); border-radius: 20px; padding: 15px; 
            border: 2px solid #333; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .card:active { transform: scale(0.95); }
        .card:hover { transform: translateY(-10px); border-color: #fff; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        
        .card-evila { border-color: #00e5ff; } .card-evila p { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; }
        .card-kel { border-color: #ff00ff; } .card-kel p { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .card-nathan { border-color: #00ff00; } .card-nathan p { color: #00ff00; text-shadow: 0 0 10px #00ff00; }

        .card img { width: 100%; height: 380px; object-fit: cover; border-radius: 15px; background: #222; }
        .card p { margin-top: 15px; font-weight: 900; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 1px; }

        /* POPUP COM ZOOM PROFISSIONAL */
        #popup { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; padding: 40px 0;
            opacity: 0; transform: scale(1.1); transition: all 0.4s ease;
        }
        #popup.active { display: block; opacity: 1; transform: scale(1); }
        
        .popup-content { max-width: 90%; margin: 0 auto; }
        .scroll-photos { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .scroll-photos img { width: 95%; max-width: 550px; border-radius: 20px; border: 3px solid #fff; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .close-btn { position: fixed; top: 20px; right: 25px; font-size: 50px; color: #fff; background: none; border: none; cursor: pointer; z-index: 2100; }

        /* DADO ESTILO CASSINO */
        #dice-btn { 
            position: fixed; bottom: 30px; right: 30px; width: 80px; height: 80px; 
            background: #fff; border-radius: 18px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; font-size: 45px; 
            box-shadow: 0 0 25px #fff; z-index: 1000; animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); box-shadow: 0 0 40px #00e5ff; } }
    </style>
</head>
<body>

    <h1>Álbum da Galera</h1>

    <div class="galeria">
        <div class="card card-evila" onclick="openGallery('evila')">
            <img src="1000002769.jpg">
            <p>Évila</p>
        </div>
        <div class="card card-kel" onclick="openGallery('kel')">
            <img src="1000002771.jpg">
            <p>Kel</p>
        </div>
        <div class="card card-nathan" onclick="openGallery('nathan')">
            <img src="1000002787.jpg">
            <p>Nathan</p>
        </div>
    </div>

    <div id="popup">
        <button class="close-btn" onclick="closeGallery()">×</button>
        <div class="popup-content">
            <h2 id="gallery-title" style="font-size: 2.5rem; margin-bottom: 30px;"></h2>
            <div id="photo-list" class="scroll-photos"></div>
        </div>
    </div>

    <div id="dice-btn" onclick="rollDice()">🎲</div>

    <script>
        const photos = {
            evila: { name: 'Évila', color: '#00e5ff', files: ['1000002769.jpg', '1000002773.jpg', '1000002777.jpg', '1000002779.jpg', '1000002781.jpg', '1000002783.jpg', '1000002785.jpg'] },
            kel: { name: 'Kel', color: '#ff00ff', files: ['1000002771.jpg', '1000002785.jpg'] },
            nathan: { name: 'Nathan', color: '#00ff00', files: ['1000002787.jpg', '1000002775.jpg'] }
        };

        function openGallery(person) {
            const popup = document.getElementById('popup');
            const data = photos[person];
            const list = document.getElementById('photo-list');
            const title = document.getElementById('gallery-title');
            
            title.innerText = data.name;
            title.style.color = data.color;
            title.style.textShadow = `0 0 20px ${data.color}`;
            list.innerHTML = ""; 

            data.files.forEach(file => {
                const img = document.createElement('img');
                img.src = file;
                img.style.borderColor = data.color;
                list.appendChild(img);
            });

            popup.style.display = 'block';
            setTimeout(() => popup.classList.add('active'), 10);
        }

        function closeGallery() {
            const popup = document.getElementById('popup');
            popup.classList.remove('active');
            setTimeout(() => popup.style.display = 'none', 400);
        }

        function rollDice() {
            const popup = document.getElementById('popup');
            const title = document.getElementById('gallery-title');
            const list = document.getElementById('photo-list');

            popup.style.display = 'block';
            setTimeout(() => popup.classList.add('active'), 10);
            
            title.innerText = "SORTEANDO...";
            title.style.color = "#ffea00";
            list.innerHTML = "";

            let count = 0;
            const interval = setInterval(() => {
                const keys = Object.keys(photos);
                const randomKey = keys[Math.floor(Math.random() * keys.length)];
                const randomFile = photos[randomKey].files[Math.floor(Math.random() * photos[randomKey].files.length)];
                list.innerHTML = `<img src="${randomFile}" style="border-color: #ffea00; width: 95%;">`;
                count++;
                if (count > 15) {
                    clearInterval(interval);
                    title.innerText = "SORTEADO: " + photos[randomKey].name;
                }
            }, 80);
        }
    </script>
</body>
</html>
