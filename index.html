<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum dos Amigos</title>
    <style>
        /* --- ESTILO GERAL --- */
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; padding-bottom: 120px; }
        h1 { color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-shadow: 0 0 10px #00e5ff; }
        
        /* --- GALERIA PRINCIPAL --- */
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 10px; max-width: 1000px; margin: 0 auto; }
        .card { background: #111; border-radius: 15px; padding: 15px; border: 2px solid #333; transition: 0.3s; cursor: pointer; }
        
        /* Cores Neon para cada um */
        .card-kel { border-color: #ff00ff; }
        .card-kel p { color: #ff00ff; }
        .card-nathan { border-color: #00ff00; }
        .card-nathan p { color: #00ff00; }
        .card-evila { border-color: #00e5ff; }
        .card-evila p { color: #00e5ff; }

        .card:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .card img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; }
        .card p { margin-top: 15px; font-weight: bold; font-size: 1.5rem; text-transform: uppercase; }

        /* --- JANELA (POPUP) --- */
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 40px 0; }
        .popup-content { max-width: 90%; margin: 0 auto; }
        .popup-title { font-size: 2rem; margin-bottom: 20px; text-transform: uppercase; }
        .scroll-photos { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .scroll-photos img { width: 90%; max-width: 500px; border-radius: 15px; border: 3px solid #fff; }
        .close-btn { position: fixed; top: 20px; right: 20px; font-size: 40px; color: #fff; background: none; border: none; cursor: pointer; z-index: 1100; }

        /* --- DADO MÁGICO --- */
        #dice-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #fff; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 0 15px #fff; z-index: 900; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>Álbum dos Amigos</h1>

    <div class="galeria">
        <div class="card card-kel" onclick="openGallery('kel')">
            <img src="IMG-20260303-WA0027.jpeg">
            <p>Kel</p>
        </div>

        <div class="card card-nathan" onclick="openGallery('nathan')">
            <img src="IMG_20260504_003607_762.jpg">
            <p>Nathan</p>
        </div>

        <div class="card card-evila" onclick="openGallery('evila')">
            <img src="IMG_20260504_003555_218.jpg">
            <p>Évila</p>
        </div>
    </div>

    <div id="popup">
        <button class="close-btn" onclick="closeGallery()">×</button>
        <div class="popup-content">
            <h2 id="gallery-title" class="popup-title"></h2>
            <div id="photo-list" class="scroll-photos"></div>
        </div>
    </div>

    <div id="dice-btn" onclick="rollDice()">🎲</div>

    <script>
        // Organização das fotos
        const photos = {
            kel: {
                name: 'Kel',
                color: '#ff00ff',
                files: ['IMG-20260303-WA0027.jpeg', 'IMG_20260504_003610_099.jpg']
            },
            nathan: {
                name: 'Nathan',
                color: '#00ff00',
                files: ['IMG_20260504_003607_762.jpg', 'IMG_20260114_152507_575.jpg']
            },
            evila: {
                name: 'Évila',
                color: '#00e5ff',
                files: [
                    'IMG_20260504_003555_218.jpg', 
                    'IMG_20260114_151256_897.jpg', 
                    'IMG_20260114_151804_695.jpg', 
                    'IMG_20260114_152524_450.jpg', 
                    'IMG_20260205_035207_192.jpg', 
                    'IMG_20260504_003550_067.jpg', 
                    'IMG_20260504_003558_579.jpg'
                ]
            }
        };

        // Abrir galeria de uma pessoa específica
        function openGallery(person) {
            const data = photos[person];
            const list = document.getElementById('photo-list');
            const title = document.getElementById('gallery-title');
            
            title.innerText = "Fotos de " + data.name;
            title.style.color = data.color;
            list.innerHTML = ""; // Limpa fotos anteriores

            data.files.forEach(file => {
                const img = document.createElement('img');
                img.src = file;
                img.style.borderColor = data.color;
                list.appendChild(img);
            });

            document.getElementById('popup').style.display = 'block';
        }

        function closeGallery() {
            document.getElementById('popup').style.display = 'none';
        }

        // Função do Dado (Escolhe 1 foto de QUALQUER pessoa)
        function rollDice() {
            const keys = Object.keys(photos);
            const randomPerson = keys[Math.floor(Math.random() * keys.length)];
            const personPhotos = photos[randomPerson].files;
            const randomFile = personPhotos[Math.floor(Math.random() * personPhotos.length)];

            const list = document.getElementById('photo-list');
            const title = document.getElementById('gallery-title');
            
            title.innerText = "Sorteado: " + photos[randomPerson].name;
            title.style.color = "#fff";
            list.innerHTML = `<img src="${randomFile}" style="border-color: #fff; width: 90%;">`;
            
            document.getElementById('popup').style.display = 'block';
        }
    </script>
</body>
</html>
