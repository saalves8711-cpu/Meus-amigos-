                <!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum VIP Pro 🎲</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; padding-bottom: 120px; overflow-x: hidden; }
        
        /* TELA DE LOGIN */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-box { 
            border: 2px solid #00e5ff; padding: 40px 20px; border-radius: 20px; 
            background: rgba(17, 17, 17, 0.9); box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); 
            text-align: center; width: 85%; max-width: 350px; 
        }
        .login-box h2 { color: #00e5ff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .frase-vip { color: #888; font-style: italic; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.4; }
        .login-box input { padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; width: 80%; font-size: 1.2rem; text-align: center; background: #000; color: #fff; outline: none; }
        .login-box button { background: #00e5ff; color: #000; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* CONTEÚDO PRINCIPAL */
        #main-content { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h1 { color: #00e5ff; text-transform: uppercase; text-shadow: 0 0 20px #00e5ff; margin: 20px 0; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
        
        .card { border: 2px solid #333; border-radius: 15px; padding: 10px; background: #0a0a0a; cursor: pointer; transition: 0.3s; position: relative; }
        .card img { width: 100%; height: 320px; object-fit: cover; border-radius: 10px; display: block; }
        .card-evila { border-color: #00e5ff; } .card-kel { border-color: #ff00ff; } .card-nathan { border-color: #00ff00; }
        .card p { font-weight: bold; font-size: 1.4rem; margin: 10px 0 5px; }

        /* EFEITO DE TRANSIÇÃO CINEMATOGRÁFICA */
        #anim-img {
            position: fixed;
            z-index: 4000;
            border-radius: 15px;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            object-fit: cover;
        }

        /* POPUP */
        #popup { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 3500; overflow-y: auto; padding: 60px 0;
        }
        .scroll-photos img { width: 92%; max-width: 500px; margin-bottom: 20px; border: 2px solid #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .close-btn { position: fixed; top: 15px; right: 20px; font-size: 50px; color: #fff; cursor: pointer; border: none; background: none; z-index: 4500; text-shadow: 0 0 10px #000; }
        
        #dice-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: #fff; border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 0 20px #fff; z-index: 1000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>ACESSO RESTRITO</h2>
            <p class="frase-vip">"Grandes momentos merecem ser guardados a sete chaves. Entre apenas se você fizer parte da história." 🔒✨</p>
            <input type="password" id="pass-input" placeholder="Código Secreto">
            <br>
            <button onclick="checkLogin()">Desbloquear</button>
        </div>
    </div>

    <div id="main-content">
        <h1>Álbum da Galera</h1>
        <div class="galeria">
            <div class="card card-evila" onclick="openGallery('evila', this)">
                <img src="IMG_20260504_003550_067.jpg"><p>Évila</p>
            </div>
            <div class="card card-kel" onclick="openGallery('kel', this)">
                <img src="IMG_20260504_003558_579.jpg"><p>Kel</p>
            </div>
            <div class="card card-nathan" onclick="openGallery('nathan', this)">
                <img src="IMG_20260504_003607_762.jpg"><p>Nathan</p>
            </div>
        </div>
    </div>

    <div id="popup">
        <button class="close-btn" onclick="closeGallery()">&times;</button>
        <div id="photo-list" class="scroll-photos"></div>
    </div>

    <div id="dice-btn" onclick="rollDice()">🎲</div>

    <script>
        const photos = {
            evila: ['IMG_20260504_003550_067.jpg', 'IMG_20260504_003555_218.jpg', 'IMG_20260504_003556_282.jpg'],
            kel: ['IMG_20260504_003558_579.jpg', 'IMG_20260504_003559_527.jpg'],
            nathan: ['IMG_20260504_003607_762.jpg', 'IMG_20260504_003610_099.jpg', 'IMG_20260504_003611_215.jpg']
        };

        function checkLogin() {
            if (document.getElementById('pass-input').value === "amigos123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Acesso Negado!"); }
        }

        // EFEITO DE EXPANSÃO (O TRUQUE DO GPT)
        function openGallery(p, el) {
            const rect = el.getBoundingClientRect();
            const anim = document.createElement('img');
            anim.src = el.querySelector('img').src;
            anim.id = "anim-img";

            // Posição inicial (exatamente onde o card está)
            anim.style.top = rect.top + "px";
            anim.style.left = rect.left + "px";
            anim.style.width = rect.width + "px";
            anim.style.height = rect.height + "px";

            document.body.appendChild(anim);

            // Pequeno delay para o CSS entender a transição
            setTimeout(() => {
                anim.style.top = "0px";
                anim.style.left = "0px";
                anim.style.width = "100vw";
                anim.style.height = "100vh";
                anim.style.borderRadius = "0px";
                anim.style.objectFit = "contain";
                anim.style.background = "black";
            }, 10);

            // Após a animação, mostra a galeria real
            setTimeout(() => {
                anim.remove();
                showGalleryContent(p);
            }, 450);
        }

        function showGalleryContent(p) {
            const list = document.getElementById('photo-list');
            list.innerHTML = `<h2 style="color:#fff; margin-bottom:30px; text-transform:uppercase;">Fotos de ${p}</h2>`;
            photos[p].forEach(imgName => {
                const img = document.createElement('img');
                img.src = imgName;
                list.appendChild(img);
            });
            document.getElementById('popup').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Trava o fundo
        }

        function closeGallery() { 
            document.getElementById('popup').style.display = 'none'; 
            document.body.style.overflow = 'auto'; // Destrava o fundo
        }

        function rollDice() {
            const list = document.getElementById('photo-list');
            document.getElementById('popup').style.display = 'block';
            let count = 0;
            const interval = setInterval(() => {
                const keys = Object.keys(photos);
                const rKey = keys[Math.floor(Math.random() * keys.length)];
                const rFile = photos[rKey][Math.floor(Math.random() * photos[rKey].length)];
                list.innerHTML = `<h2 style="color:#ffea00">SORTEANDO...</h2><img src="${rFile}" style="border-color:#ffea00; width:90%;">`;
                count++;
                if (count > 12) {
                    clearInterval(interval);
                    list.innerHTML = `<h2 style="color:#00ff00">SORTEADO: ${rKey.toUpperCase()}!</h2><img src="${rFile}" style="border-color:#00ff00; width:90%;">`;
                }
            }, 100);
        }

        document.getElementById('pass-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkLogin(); });
    </script>
</body>
</html>
