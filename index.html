<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum VIP 🎲</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; padding-bottom: 120px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { border: 2px solid #00e5ff; padding: 30px; border-radius: 15px; background: #111; box-shadow: 0 0 15px #00e5ff; }
        .login-box input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 20px; width: 80%; font-size: 1rem; text-align: center; }
        .login-box button { background: #00e5ff; color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #main-content { display: none; }
        h1 { color: #00e5ff; text-transform: uppercase; text-shadow: 0 0 20px #00e5ff; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { border: 2px solid #333; border-radius: 15px; padding: 10px; background: #0a0a0a; cursor: pointer; }
        .card img { width: 100%; height: 320px; object-fit: cover; border-radius: 10px; }
        .card-evila { border-color: #00e5ff; } .card-kel { border-color: #ff00ff; } .card-nathan { border-color: #00ff00; }
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; padding-top: 50px; }
        .scroll-photos img { width: 90%; max-width: 500px; margin-bottom: 15px; border: 2px solid #fff; border-radius: 10px; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 50px; color: #fff; cursor: pointer; }
        #dice-btn { position: fixed; bottom: 30px; right: 30px; width: 80px; height: 80px; background: #fff; border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 45px; box-shadow: 0 0 25px #fff; z-index: 1000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #00e5ff;">ACESSO VIP</h2>
            <input type="password" id="pass-input" placeholder="Senha: amigos123">
            <br>
            <button onclick="checkLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="main-content">
        <h1>Álbum da Galera</h1>
        <div class="galeria">
            <div class="card card-evila" onclick="openGallery('evila')"><img src="IMG_20260504_003550_067.jpg"><p>Évila</p></div>
            <div class="card card-kel" onclick="openGallery('kel')"><img src="IMG_20260504_003558_579.jpg"><p>Kel</p></div>
            <div class="card card-nathan" onclick="openGallery('nathan')"><img src="IMG_20260504_003607_762.jpg"><p>Nathan</p></div>
        </div>
    </div>

    <div id="popup">
        <span class="close-btn" onclick="closeGallery()">&times;</span>
        <div id="photo-list" class="scroll-photos"></div>
    </div>

    <div id="dice-btn" onclick="rollDice()">🎲</div>

    <script>
        function checkLogin() {
            if (document.getElementById('pass-input').value === "amigos123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Senha incorreta!"); }
        }

        // Listas com os nomes reais dos arquivos do seu print
        const photos = {
            evila: ['IMG_20260504_003550_067.jpg', 'IMG_20260504_003555_218.jpg', 'IMG_20260504_003556_282.jpg'],
            kel: ['IMG_20260504_003558_579.jpg', 'IMG_20260504_003559_527.jpg'],
            nathan: ['IMG_20260504_003607_762.jpg', 'IMG_20260504_003610_099.jpg', 'IMG_20260504_003611_215.jpg', 'IMG_20260114_152507_575.jpg']
        };

        function openGallery(p) {
            const list = document.getElementById('photo-list');
            list.innerHTML = "";
            photos[p].forEach(imgName => {
                const img = document.createElement('img');
                img.src = imgName;
                list.appendChild(img);
            });
            document.getElementById('popup').style.display = 'block';
        }

        function closeGallery() { document.getElementById('popup').style.display = 'none'; }

        function rollDice() {
            document.getElementById('popup').style.display = 'block';
            const list = document.getElementById('photo-list');
            let count = 0;
            const interval = setInterval(() => {
                const keys = Object.keys(photos);
                const rKey = keys[Math.floor(Math.random() * keys.length)];
                const rFile = photos[rKey][Math.floor(Math.random() * photos[rKey].length)];
                list.innerHTML = `<h2 style="color:#ffea00">SORTEANDO...</h2><img src="${rFile}" style="border-color:#ffea00">`;
                count++;
                if (count > 12) {
                    clearInterval(interval);
                    list.innerHTML = `<h2 style="color:#00ff00">SORTEADO!</h2><img src="${rFile}" style="border-color:#00ff00">`;
                }
            }, 100);
        }
    </script>
</body>
</html>
