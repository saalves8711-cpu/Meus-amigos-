<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum dos Amigos 🎲</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { border: 2px solid #00e5ff; padding: 30px; border-radius: 20px; width: 80%; max-width: 300px; }
        input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 15px; width: 85%; text-align: center; font-size: 16px; }
        button { background: #00e5ff; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #main-content { display: none; }
        .galeria { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #333; padding: 10px; border-radius: 15px; background: #111; }
        .card img { width: 100%; border-radius: 10px; height: 300px; object-fit: cover; }
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 4000; overflow-y: auto; padding-top: 50px; }
        #dice-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: #fff; border-radius: 20px; font-size: 40px; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 0 20px #fff; color: #000; }
        .close-btn { position: fixed; top: 15px; right: 20px; font-size: 50px; color: #fff; background: none; border: none; z-index: 5000; }
    </style>
</head>
<body>

    <audio id="music-evila" src="evila.mp3" preload="auto"></audio>
    <audio id="music-kel" src="kel.mp3" preload="auto"></audio>
    <audio id="music-nathan" src="nathan.mp3" preload="auto"></audio>

    <div id="login-screen">
        <div class="login-box">
            <h2>ENTRADA VIP</h2>
            <input type="password" id="pass-input" placeholder="Digite a senha">
            <button onclick="checkLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="main-content">
        <h1>Galera 🎲</h1>
        <div class="galeria">
            <div class="card"><img src="IMG_20260504_003550_067.jpg"><p>Évila</p></div>
            <div class="card"><img src="IMG_20260504_003558_579.jpg"><p>Kel</p></div>
            <div class="card"><img src="IMG_20260504_003607_762.jpg"><p>Nathan</p></div>
        </div>
    </div>

    <div id="popup">
        <button class="close-btn" onclick="closeGallery()">&times;</button>
        <div id="photo-list"></div>
    </div>

    <div id="dice-btn" onclick="rollDice()">🎲</div>

    <script>
        const photos = {
            evila: ['IMG_20260504_003550_067.jpg'],
            kel: ['IMG_20260504_003558_579.jpg'],
            nathan: ['IMG_20260504_003607_762.jpg']
        };

        function checkLogin() {
            if (document.getElementById('pass-input').value === "amigos123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Senha incorreta!"); }
        }

        function stopAllMusic() {
            ['music-evila', 'music-kel', 'music-nathan'].forEach(id => {
                const m = document.getElementById(id);
                if(m) { m.pause(); m.currentTime = 0; }
            });
        }

        function closeGallery() {
            document.getElementById('popup').style.display = 'none';
            stopAllMusic();
        }

        function rollDice() {
            stopAllMusic();
            const list = document.getElementById('photo-list');
            document.getElementById('popup').style.display = 'block';
            
            let count = 0;
            const keys = Object.keys(photos);
            
            const interval = setInterval(() => {
                const rKey = keys[Math.floor(Math.random() * keys.length)];
                list.innerHTML = `<h2 style="color:#ffea00">SORTEANDO...</h2><img src="${photos[rKey][0]}" style="width:85%; border-radius:15px;">`;
                count++;

                if (count > 15) {
                    clearInterval(interval);
                    const winner = keys[Math.floor(Math.random() * keys.length)];
                    list.innerHTML = `<h1 style="color:#00ff00">${winner.toUpperCase()}! 🎶</h1><img src="${photos[winner][0]}" style="width:85%; border-radius:15px; border: 3px solid #00ff00;">`;
                    
                    const audio = document.getElementById("music-" + winner);
                    if(audio) {
                        audio.play().catch(e => console.log("Erro ao tocar:", e));
                    }
                }
            }, 100);
        }
    </script>
</body>
</html>
