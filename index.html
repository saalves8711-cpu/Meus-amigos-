<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum VIP 🎲</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { border: 2px solid #00e5ff; padding: 20px; border-radius: 15px; background: #111; }
        #main-content { display: none; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { border: 2px solid #333; border-radius: 15px; padding: 10px; background: #0a0a0a; }
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; display: block; }
        .card-evila { border-color: #00e5ff; } .card-kel { border-color: #ff00ff; } .card-nathan { border-color: #00ff00; }
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .scroll-photos img { width: 90%; max-width: 500px; margin: 10px 0; border: 2px solid #fff; border-radius: 10px; }
        .close-btn { position: fixed; top: 10px; right: 20px; font-size: 40px; color: #fff; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>SENHA</h2>
            <input type="password" id="pass-input" style="padding: 10px; text-align: center;">
            <br><br>
            <button onclick="checkLogin()" style="padding: 10px 20px; cursor: pointer;">ENTRAR</button>
        </div>
    </div>

    <div id="main-content">
        <h1>Álbum da Galera</h1>
        <div class="galeria">
            <div class="card card-evila" onclick="openGallery('evila')"><img src="1000002769.jpg"><p>Évila</p></div>
            <div class="card card-kel" onclick="openGallery('kel')"><img src="1000002771.jpg"><p>Kel</p></div>
            <div class="card card-nathan" onclick="openGallery('nathan')"><img src="1000002787.jpg"><p>Nathan</p></div>
        </div>
    </div>

    <div id="popup">
        <span class="close-btn" onclick="closeGallery()">&times;</span>
        <div id="photo-list" class="scroll-photos"></div>
    </div>

    <script>
        function checkLogin() {
            const pass = document.getElementById('pass-input').value;
            if (pass === "amigos123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Senha errada!"); }
        }

        const photos = {
            evila: ['1000002769.jpg', '1000002773.jpg', '1000002777.jpg'],
            kel: ['1000002771.jpg'],
            nathan: ['1000002787.jpg', '1000002775.jpg']
        };

        function openGallery(p) {
            const list = document.getElementById('photo-list');
            list.innerHTML = "";
            photos[p].forEach(imgName => {
                const img = document.createElement('img');
                img.src = imgName;
                list.appendChild(img);
            });
            document.getElementById('popup').style.display = 'block';
        }

        function closeGallery() { document.getElementById('popup').style.display = 'none'; }
    </script>
</body>
</html>
