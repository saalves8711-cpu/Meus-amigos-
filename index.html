<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum dos Amigos</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 10px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border-radius: 15px; padding: 15px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #00e5ff; transform: translateY(-5px); }
        .card img { width: 100%; height: 350px; object-fit: cover; border-radius: 10px; border: 2px solid #00e5ff; }
        .card p { margin-top: 15px; font-weight: bold; font-size: 1.2rem; color: #00e5ff; }
    </style>
</head>
<body>

    <h1>Álbum dos Amigos</h1>

    <div class="galeria">
        <div class="card">
            <img src="IMG_20260504_003607_762.jpg">
            <p>Nathan</p>
        </div>

        <div class="card">
            <img src="IMG_20260504_003555_218.jpg">
            <p>Évila</p>
        </div>

        <div class="card">
            <img src="IMG_20260114_151256_897.jpg">
            <p>Évila</p>
        </div>

        <div class="card">

        </div>

        <div class="card">
            <img src="IMG-20260303-WA0027.jpeg">
            <p>Kel</p>
        </div>
    </div>

</body>
</html>
